<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>HDT Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: rgb(255, 255, 255);
        color: #1a1a2e;
        font-family: system-ui;
      }
      #controls {
        padding: 0.5rem 1rem;
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
      }
      #sparql-input {
        flex: 1;
        font-family: monospace;
        font-size: 0.8rem;
        background: #16213e;
        color: #e0e0e0;
        border: 1px solid #333;
        padding: 0.5rem;
        resize: vertical;
      }
      #sparql-run {
        padding: 0.5rem 1rem;
        background: #e94560;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 3px;
        font-size: 0.85rem;
      }
      #sparql-run:hover {
        background: #c73e54;
      }
      #sparql-run:disabled {
        background: #555;
        cursor: not-allowed;
      }
      #status {
        padding: 0 1rem 0.5rem;
        font-size: 0.8rem;
        color: #888;
      }
      #graph {
        width: 100vw;
        height: calc(100vh - 8rem);
      }

      rdf-graph {
        width: 100%;
        height: calc(100vh - 8rem);
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>HDT Test</h1>
    <!--
    <div id="controls">
      <textarea id="sparql-input" rows="3">SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 200</textarea>
      <button id="sparql-run" disabled>Ausführen</button>
    </div>
    <div id="status" class="status loading">Loading...</div>
    <div id="graph"></div>
    <script type="module" src="./assets/ts/main.ts"></script>
  -->
    <div id="controls">
      <textarea id="sparql-input"></textarea>
      <button id="sparql-run" disabled>Query ausführen</button>
    </div>
    <div id="status">Lade…</div>

    <rdf-graph
    src="/meta/wikidata/enriched_entities.hdt"
    languages="mul,de,en"
    node-scaling="log"
    sparql-query="
      PREFIX schema: <http://schema.org/>
      SELECT ?s ?p ?o ?isTagged WHERE {
        <https://christianmahnke.de/post/> schema:blogPost ?post .
        ?post ?p ?o .
        BIND(?post AS ?s)
        FILTER(?p NOT IN (
          schema:author,
          schema:url,
          schema:workTranslation,
          <http://www.w3.org/1999/02/22-rdf-syntax-ns#type>
        ))
        FILTER(?o NOT IN (
          schema:BlogPosting
        ))
        OPTIONAL {
          ?post schema:identifier ?ident .
          ?ident a schema:PropertyValue ;
                 schema:propertyID &quot;projektemacher&quot; ;
                 schema:value &quot;tag&quot; .
          BIND(true AS ?isTagged)
        }
      }
    "
  ></rdf-graph>

    <script type="module" src="./assets/ts/main.ts"></script>
  </body>
</html>
