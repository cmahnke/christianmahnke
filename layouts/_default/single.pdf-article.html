{{ define "title" -}}
  {{- if ne .Title "" -}}
    {{- .Title }} · {{ .Site.Title -}}
  {{- else -}}
    {{- .Site.Title -}}
  {{- end -}}
{{- end }}
{{ define "content" }}
  {{- partial "header.html" . -}}
  <div class="content-container single">
    {{ partial "article/page.html" . }}
  </div>
{{ end }}
