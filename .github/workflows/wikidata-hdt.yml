name: Generate Wikidata HDT

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  schedule:
    - cron:  '00 22 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout projektemacher-base repository
        uses: actions/checkout@v4
        with:
          repository: cmahnke/projektemacher-base
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests rdflib

      - name: Run Wikidata enrichment script
        run: |
          python scripts/wikidata/get_entities.py https://christianmahnke.de/meta/schema.org/index.json -t

      - name: Convert TTL to HDT
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" -w /data ghcr.io/cmahnke/lod-tools/rdf2hdt:latest enriched_entities.ttl enriched_entities.hdt

      - name: Upload enriched HDT artifact
        uses: actions/upload-artifact@v7
        with:
          name: enriched_entities
          path: |
            enriched_entities.hdt


  deploy:
    needs: build
    uses: ./.github/workflows/deploy-hdt.yml
    secrets: inherit